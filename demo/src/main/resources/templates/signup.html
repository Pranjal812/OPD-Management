<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up · Smart OPD Mumbai Central</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f4fafc;
            color: #1e3a3a;
            font-size: 15px;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: rgba(0, 85, 85, 0.92);
            -webkit-backdrop-filter: blur(5px);
            backdrop-filter: blur(5px);
            color: white;
            padding: 10px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(0, 35, 35, 0.3);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
        }

        .logo-img-real {
            height: 44px;
            width: 44px;
            border-radius: 8px;
            object-fit: cover;
        }

        .brand-name {
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .contact-info {
            display: flex;
            gap: 20px;
        }
        .contact-item {
            text-decoration: none;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.15);
            padding: 5px 14px;
            border-radius: 30px;
            transition: 0.2s;
        }
        .contact-item i { font-size: 1rem; }
        .contact-item:hover { background: #ffd966; color: #004d4d; }

        .signup-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 90px 20px 20px 20px;
            margin-top: 0;
            background: url('/bg.jpg') center/cover no-repeat fixed;
            position: relative;
            overflow: hidden;
        }

        .signup-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 40, 40, 0.55);
            z-index: 0;
        }

        .signup-container {
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 2;
            animation: fadeUp 0.9s ease-out forwards;
        }

        @keyframes fadeUp {
            0% { opacity:0; transform:translateY(25px); }
            100% { opacity:1; transform:translateY(0); }
        }

        .signup-card {
            background: rgba(255, 255, 255, 0.95);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px 35px;
            box-shadow: 0 30px 50px -15px #00959555, 0 0 0 1px rgba(0,130,130,0.1) inset;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signup-header h2 {
            font-size: 2.2rem;
            color: #005757;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .signup-header p {
            color: #2f5a5a;
            font-size: 1rem;
        }

        .signup-header i {
            color: #008b8b;
            margin: 0 5px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #004d4d;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }

        .form-group label i {
            margin-right: 6px;
            color: #008b8b;
            width: 18px;
        }

        .form-control {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid #b2e0e0;
            border-radius: 60px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
            background-color: #fff;
            box-shadow: 0 4px 8px #a6d6d633;
        }

        .form-control::placeholder {
            color: #88baba;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #008b8b;
            box-shadow: 0 0 0 4px rgba(0, 139, 139, 0.15), 0 8px 16px rgba(0, 100, 100, 0.1);
            transform: translateY(-2px);
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23008b8b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 18px center;
            background-size: 16px;
        }

        textarea.form-control {
            border-radius: 20px;
            resize: vertical;
            min-height: 80px;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #008b8b, #006666);
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 16px rgba(0,100,100,0.3);
        }

        .btn-signup:hover {
            background: linear-gradient(135deg, #006666, #004d4d);
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0,100,100,0.4);
        }

        .btn-signup i {
            font-size: 1.1rem;
        }

        .links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.95rem;
            color: #2f5a5a;
            line-height: 1.8;
        }

        .links a {
            color: #008b8b;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .links a:hover {
            color: #006666;
            text-decoration: underline;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
            padding: 8px 20px;
            background: #e2f3f3;
            border-radius: 40px;
            color: #004d4d !important;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .back-home:hover {
            background: #c0e6e6;
            transform: translateX(-5px);
            text-decoration: none !important;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid #c33;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 12px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid #2e7d32;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        footer {
            background: #002a2a;
            color: #bae8e8;
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            margin-top: auto;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }
            .form-row .form-group {
                margin-bottom: 18px;
            }
            header {
                padding: 10px 20px;
            }
            .brand-name {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<header>
    <a th:href="@{/}" class="logo-section">
        <img class="logo-img-real" th:src="@{/logo.png}" alt="OPD logo">
        <div class="brand-name">OPD</div>
    </a>
    <div class="contact-info">
        <a href="tel:+918882226660" class="contact-item"><i class="fas fa-phone-alt"></i> +91 8882226660</a>
        <a href="mailto:smartopd@gmail.com" class="contact-item"><i class="fas fa-envelope"></i> smartopd@gmail.com</a>
    </div>
</header>

<div class="signup-wrapper">
    <div class="signup-container">
        <div class="signup-card">
            <div class="signup-header">
                <h2><i class="fas fa-user-plus"></i> Create Account</h2>
                <p>Join Smart OPD community for better healthcare</p>
            </div>

            <!-- Error/Success Messages -->
            <div th:if="${error}" class="error-message">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>
            <div th:if="${success}" class="success-message">
                <i class="fas fa-check-circle"></i>
                <span th:text="${success}"></span>
            </div>

            <form th:action="@{/auth/signup}" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Full Name</label>
                        <input type="text" id="fullName" name="fullName" class="form-control" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-at"></i> Username</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="Username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="role"><i class="fas fa-user-tag"></i> Select Your Role</label>
                    <select id="role" name="role" class="form-control" onchange="toggleSpecialization()" required>
                        <option value="" disabled selected>-- Select Role --</option>
                        <option value="PATIENT">Patient</option>
                        <option value="DOCTOR">Doctor</option>
                        <option value="STAFF">Staff/Admin</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="age"><i class="fas fa-calendar-alt"></i> Age</label>
                        <input type="number" id="age" name="age" class="form-control" min="0" placeholder="Age" required>
                    </div>
                    <div class="form-group">
                        <label for="gender"><i class="fas fa-venus-mars"></i> Gender</label>
                        <select id="gender" name="gender" class="form-control" required>
                            <option value="" disabled selected>Select</option>
                            <option value="MALE">Male</option>
                            <option value="FEMALE">Female</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dateOfBirth"><i class="fas fa-birthday-cake"></i> Date of Birth</label>
                        <input type="date" id="dateOfBirth" name="dateOfBirth" class="form-control" title="Date of Birth">
                    </div>
                    <div class="form-group">
                        <label for="specialization"><i class="fas fa-stethoscope"></i> Specialization (Doctor only)</label>
                        <select id="specialization" name="specialization" class="form-control">
                            <option value="" disabled selected>-- Select Specialty --</option>
                            <option value="General Physician">General Physician</option>
                            <option value="Cardiologist">Cardiologist</option>
                            <option value="Neurologist">Neurologist</option>
                            <option value="Pediatrician">Pediatrician</option>
                            <option value="Gynecologist">Gynecologist</option>
                            <option value="Psychiatrist">Psychiatrist</option>
                            <option value="Radiologist">Radiologist</option>
                            <option value="Oncologist">Oncologist</option>
                            <option value="Pulmonologist">Pulmonologist</option>
                            <option value="Dentist">Dentist</option>
                            <option value="Dermatologist">Dermatologist</option>
                            <option value="Ophthalmologist">Ophthalmologist</option>
                            <option value="Orthopedic">Orthopedic</option>
                            <option value="ENT Specialist">ENT Specialist</option>
                        </select>
                    </div>
                </div>

                <script>
                    function toggleSpecialization() {
                        const role = document.getElementById('role').value;
                        const specInput = document.getElementById('specialization');
                        if (role === 'DOCTOR') {
                            specInput.disabled = false;
                            specInput.required = true;
                            // Reset to first option if previously disabled
                            if(specInput.selectedIndex === -1) specInput.selectedIndex = 0;
                        } else {
                            specInput.disabled = true;
                            specInput.value = "";
                            specInput.required = false;
                        }
                    }
                    // Run once on load to ensure correct state
                    document.addEventListener('DOMContentLoaded', toggleSpecialization);
                </script>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="name@gmail.com" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone</label>
                        <input type="tel" id="contactNumber" name="contactNumber" class="form-control" placeholder="10-digit number" required 
                               pattern="[0-9]{10}" minlength="10" maxlength="10" title="Please enter exactly 10 digits">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-map-marker-alt"></i> Residential Address</label>
                    <textarea id="address" name="address" class="form-control" placeholder="Enter your full address" required></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter Password" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Repeat password" required>
                    </div>
                </div>

                <button type="submit" class="btn-signup">
                    <i class="fas fa-user-plus"></i> Register Now
                </button>
            </form>

            <div class="links">
                <i class="fas fa-question-circle"></i> Already have an account?
                <a th:href="@{/auth/login}">Login here <i class="fas fa-arrow-right"></i></a><br>
                <a th:href="@{/}" class="back-home">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>
</div>

<footer>
    <p><i class="far fa-copyright"></i> Smart OPD — Mumbai Central · Grant Road East, Mumbai 400008  |  📞 +91 8882226660  |  ✉️ smartopd@gamil.com</p>
</footer>

</body>
</html>
