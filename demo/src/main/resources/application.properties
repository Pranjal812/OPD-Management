spring.application.name=opd_management
# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/opd_management?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&connectionTimeZone=UTC
spring.datasource.username=root
spring.datasource.password=mY$Q!12#08
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIKARI CONNECTION POOL CONFIG
# ===============================
# Reduced pool size for local dev to avoid thread contention
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
# Increase timeout to be more resilient to clock leaps/starvation
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
# Validation query to ensure connections are alive
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=5000

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# DIALECT
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# SERVER
# ===============================
server.port=8084